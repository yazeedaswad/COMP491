experiment:
  name: unsw_nb15_mlp_unweighted
  seed: 42
  task: multiclass

data:
  processed_npz_path: data/processed/unsw_nb15_multiclass.npz

model:
  name: mlp
  input_dim: null
  num_classes: null
  hidden_dim: 128
  dropout: 0.2

training:
  epochs: 20
  batch_size: 512
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: cross_entropy
  class_weighting: none
  device: auto

outputs:
  run_dir: reports/runs/unsw_nb15_mlp_unweighted

