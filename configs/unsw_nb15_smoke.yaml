experiment:
  name: unsw_nb15_smoke
  seed: 42
  task: multiclass

data:
  processed_npz_path: data/processed/unsw_nb15_multiclass.npz

model:
  name: cnn_transformer
  input_dim: null
  num_classes: null
  cnn_channels: 32
  transformer_dim: 32
  transformer_layers: 1
  attention_heads: 4
  dropout: 0.2

training:
  epochs: 1
  batch_size: 512
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: focal
  focal_gamma: 2.0
  class_weighting: balanced
  device: auto

outputs:
  run_dir: reports/runs/unsw_nb15_smoke
