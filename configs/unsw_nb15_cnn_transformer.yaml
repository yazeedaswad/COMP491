experiment:
  name: unsw_nb15_cnn_transformer
  seed: 42
  task: multiclass

data:
  processed_npz_path: data/processed/unsw_nb15_multiclass.npz
  train_csv_path: data/raw/UNSW_NB15_training-set.csv
  test_csv_path: data/raw/UNSW_NB15_testing-set.csv
  label_column: attack_cat
  val_size: 0.1
  categorical_columns:
    - proto
    - service
    - state
  drop_columns:
    - id
    - label

model:
  name: cnn_transformer
  input_dim: null
  num_classes: null
  cnn_channels: 64
  transformer_dim: 64
  transformer_layers: 2
  attention_heads: 4
  dropout: 0.2

training:
  epochs: 20
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: focal
  focal_gamma: 2.0
  class_weighting: balanced
  device: auto

outputs:
  run_dir: reports/runs/unsw_nb15_cnn_transformer
