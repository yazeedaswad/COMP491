experiment:
  name: unsw_nb15_cnn_transformer_unweighted
  seed: 42
  task: multiclass

data:
  processed_npz_path: data/processed/unsw_nb15_multiclass.npz

model:
  name: cnn_transformer
  input_dim: null
  num_classes: null
  cnn_channels: 64
  transformer_dim: 64
  transformer_layers: 2
  attention_heads: 4
  dropout: 0.2

training:
  epochs: 20
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: cross_entropy
  class_weighting: none
  device: auto

outputs:
  run_dir: reports/runs/unsw_nb15_cnn_transformer_unweighted

