experiment:
  name: unsw_to_nsl_cnn_transformer_weighted_ce
  seed: 42
  task: binary_cross_dataset

data:
  processed_npz_path: data/processed/unsw_to_nsl_binary_aligned.npz

model:
  name: cnn_transformer
  input_dim: null
  num_classes: null
  cnn_channels: 64
  transformer_dim: 64
  transformer_layers: 2
  attention_heads: 4
  dropout: 0.2

training:
  epochs: 20
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: weighted_cross_entropy
  class_weighting: balanced
  device: auto

outputs:
  run_dir: reports/runs/unsw_to_nsl_cnn_transformer_weighted_ce

